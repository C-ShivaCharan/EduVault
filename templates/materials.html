{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Academic Materials - BCA</h2>
    <p class="subtitle">Select your semester to access notes, textbooks, and previous year questions. Only available for
        BCA.</p>

    <div class="sem-grid">
        <a href="{{ url_for('main.semester_view', semester='Sem1') }}" class="sem-card">Semester 1</a>
        <a href="{{ url_for('main.semester_view', semester='Sem2') }}" class="sem-card">Semester 2</a>
        <a href="{{ url_for('main.semester_view', semester='Sem3') }}" class="sem-card">Semester 3</a>
        <a href="{{ url_for('main.semester_view', semester='Sem4') }}" class="sem-card">Semester 4</a>
        <a href="{{ url_for('main.semester_view', semester='Sem5') }}" class="sem-card">Semester 5</a>
        <a href="{{ url_for('main.semester_view', semester='Sem6') }}" class="sem-card">Semester 6</a>
    </div>
</div>

<style>
    .subtitle {
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 2rem;
    }

    .sem-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        padding: 1rem;
    }

    .sem-card {
        background: var(--surface);
        padding: 2.5rem;
        border-radius: 15px;
        text-align: center;
        text-decoration: none;
        color: white;
        font-size: 1.5rem;
        font-weight: bold;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .sem-card:hover {
        transform: translateY(-5px);
        background: var(--primary-color);
        box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
    }
</style>
{% endblock %}
