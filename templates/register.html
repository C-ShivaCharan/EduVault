{% extends 'base.html' %}

{% block content %}
<div class="container auth-container">
    <h2>Student Registration</h2>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash-messages">
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('main.register') }}" class="auth-form">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label for="admission_number">Admission Number</label>
            <input type="text" id="admission_number" name="admission_number" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" required>
                <span class="toggle-password" onclick="togglePassword()">
                    <!-- Eye Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>
        </div>
        <div class="form-group">
            <label for="security_question">Security Question</label>
            <select id="security_question" name="security_question" required>
                <option value="" disabled selected>Select a question...</option>
                <option value="What is your pet's name?">What is your pet's name?</option>
                <option value="What is your favorite food?">What is your favorite food?</option>
                <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                <option value="What city were you born in?">What city were you born in?</option>
                <option value="What is your favorite movie?">What is your favorite movie?</option>
            </select>
        </div>
        <div class="form-group">
            <label for="security_answer">Security Answer</label>
            <input type="text" id="security_answer" name="security_answer" placeholder="Your secret answer" required>
        </div>
        <button type="submit" class="btn-primary">Register</button>
        <p class="auth-link">Already have an account? <a href="{{ url_for('main.login') }}">Login here</a></p>
    </form>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password svg');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.style.stroke = 'var(--primary-color)';
            } else {
                passwordInput.type = 'password';
                toggleIcon.style.stroke = 'currentColor';
            }
        }
    </script>
</div>

<style>
    /* Reusing auth styles from login page (could be in style.css but keeping inline for specific page overrides if needed) */
    .auth-container {
        max-width: 400px;
        margin-top: 4rem;
        padding: 2rem;
        background: var(--surface);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .auth-container h2 {
        margin-bottom: 1.5rem;
        text-align: center;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group label {
        font-size: 0.9rem;
        color: var(--text-muted);
    }

    .form-group input {
        padding: 0.8rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.2);
        color: white;
        width: 100%;
    }

    .password-wrapper {
        position: relative;
    }

    .password-wrapper input {
        width: 100%;
        padding-right: 40px;
    }

    .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
    }

    .toggle-password:hover {
        color: white;
    }

    .auth-link {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 1rem;
    }

    .auth-link a {
        color: var(--primary-color);
        text-decoration: none;
    }

    .alert {
        padding: 0.8rem;
        background: rgba(255, 107, 107, 0.2);
        border: 1px solid #ff6b6b;
        color: #ff6b6b;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
    }
</style>
{% endblock %}
