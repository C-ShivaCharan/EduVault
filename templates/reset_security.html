{% extends 'base.html' %}

{% block content %}
<div class="container auth-container">
    <h2>Security Check</h2>
    <p class="subtitle">Answer your security question to reset your password.</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash-messages">
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('main.reset_security', user_id=user_id) }}" class="auth-form">
        <div class="form-group">
            <label>Security Question</label>
            <div class="question-box">{{ question }}</div>
        </div>

        <div class="form-group">
            <label for="security_answer">Your Answer</label>
            <input type="text" id="security_answer" name="security_answer" placeholder="Enter your secret answer"
                required>
        </div>

        <div class="form-group">
            <label for="new_password">New Password</label>
            <div class="password-wrapper">
                <input type="password" id="new_password" name="new_password" required>
                <span class="toggle-password" onclick="togglePassword()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>
        </div>

        <button type="submit" class="btn-primary">Reset Password</button>
    </form>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('new_password');
            const toggleIcon = document.querySelector('.toggle-password svg');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.style.stroke = 'var(--primary-color)';
            } else {
                passwordInput.type = 'password';
                toggleIcon.style.stroke = 'currentColor';
            }
        }
    </script>
</div>

<style>
    .auth-container {
        max-width: 400px;
        margin-top: 4rem;
        padding: 2rem;
        background: var(--surface);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    h2 {
        text-align: center;
        margin-bottom: 0.5rem;
    }

    .subtitle {
        text-align: center;
        color: var(--text-muted);
        margin-bottom: 2rem;
        font-size: 0.9rem;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group label {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .question-box {
        padding: 1rem;
        background: rgba(108, 92, 231, 0.1);
        border: 1px solid var(--primary-color);
        border-radius: 8px;
        color: white;
        font-weight: 500;
    }

    .form-group input {
        padding: 0.8rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.2);
        color: white;
        width: 100%;
    }

    .password-wrapper {
        position: relative;
    }

    .password-wrapper input {
        padding-right: 40px;
    }

    .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
    }

    .toggle-password:hover {
        color: white;
    }

    .alert {
        padding: 0.8rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        background: rgba(255, 107, 107, 0.2);
        border: 1px solid #ff6b6b;
        color: #ff6b6b;
    }
</style>
{% endblock %}
