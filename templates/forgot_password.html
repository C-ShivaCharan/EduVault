{% extends 'base.html' %}

{% block content %}
<div class="container auth-container">
    <h2>Account Recovery</h2>
    <p class="subtitle">Enter your Admission Number to verify your identity.</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="flash-messages">
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('main.forgot_password') }}" class="auth-form">
        <div class="form-group">
            <label for="admission_number">Admission Number</label>
            <input type="text" id="admission_number" name="admission_number" placeholder="e.g. 23BCA45" required>
        </div>
        <button type="submit" class="btn-primary">Next &rarr;</button>
        <p class="auth-link"><a href="{{ url_for('main.login') }}">&larr; Back to Login</a></p>
    </form>
</div>

<style>
    .auth-container {
        max-width: 400px;
        margin-top: 4rem;
        padding: 2rem;
        background: var(--surface);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    h2 {
        text-align: center;
        margin-bottom: 0.5rem;
    }

    .subtitle {
        text-align: center;
        color: var(--text-muted);
        margin-bottom: 2rem;
        font-size: 0.9rem;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group label {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
        padding: 0.8rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.2);
        color: white;
    }

    .auth-link {
        text-align: center;
        margin-top: 1rem;
    }

    .auth-link a {
        color: var(--primary-color);
        text-decoration: none;
    }

    .alert {
        padding: 0.8rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        background: rgba(255, 107, 107, 0.2);
        border: 1px solid #ff6b6b;
        color: #ff6b6b;
    }
</style>
{% endblock %}
