<div class="file-card">
    <div class="file-icon">
        <!-- Document Icon SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
    </div>

    <div class="file-info">
        <a href="{{ url_for('static', filename=m.filepath) }}" target="_blank" class="file-title" title="{{ m.title }}">
            {{ m.title }}
        </a>
    </div>

    <div class="file-actions">
        {% if current_user.role == 'admin' %}
        <form action="{{ url_for('main.delete_material', id=m.id) }}" method="POST" style="display:inline;">
            <button type="submit" class="btn-icon" title="Delete" onclick="return confirm('Delete this file?')">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </form>
        {% endif %}
    </div>
</div>
